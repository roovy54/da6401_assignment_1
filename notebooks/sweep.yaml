method: random

metric:
  name: val_f1
  goal: maximize

run_cap: 200

parameters:

  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop"]

  learning_rate:
    values: [0.0001, 0.0005, 0.001]

  batch_size:
    values: [32, 64, 128]

  epochs:
    values: [5, 10]

  num_layers:
    values: [2, 3, 4]

  hidden_size:
    values: [64, 128, 256]

  activation:
    values: ["relu", "tanh", "sigmoid"]

  loss:
    values: ["cross_entropy", "mse"]

  weight_init:
    values: ["xavier", "random"]

  weight_decay:
    values: [0.0, 0.0005, 0.001]

command:
  - python
  - ../src/train.py
  - ${args}